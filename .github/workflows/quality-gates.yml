name: quality-gates

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      gate_force_fail:
        description: "Optional forced gate failure mode for regression evidence"
        required: false
        default: ""

env:
  CI: "true"
  TURBO_TELEMETRY_DISABLED: "1"
  MPS_GATE_FORCE_FAIL: ${{ github.event.inputs.gate_force_fail || '' }}

permissions:
  contents: read

jobs:
  quality:
    name: lint-typecheck-test-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Install Playwright browser for desktop gates
        run: pnpm --filter @mps/desktop exec playwright install --with-deps chromium

      - name: Run quality gates
        run: pnpm -w turbo run lint typecheck test build

      - name: Verify docs parity
        run: pnpm -w verify:docs-parity --strict

  release-build-artifacts:
    name: release-build-artifacts
    runs-on: ubuntu-latest
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Install Playwright browser for desktop release build
        run: pnpm --filter @mps/desktop exec playwright install --with-deps chromium

      - name: Build release artifacts
        run: pnpm -w build:release

      - name: Verify release artifacts
        run: pnpm -w verify:release-artifacts

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-web-static
          path: |
            release/stable/v*/web/mps-web-v*-static.tar
          if-no-files-found: error
          retention-days: 14

  desktop-native-artifacts:
    name: desktop-native-${{ matrix.id }}
    needs:
      - quality
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runs_on: ubuntu-latest
            build_command: pnpm --filter @mps/desktop exec tauri build --config src-tauri/tauri.conf.json --bundles appimage
            artifact_name: desktop-linux-x64-native
            artifact_path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - id: windows-x64
            runs_on: windows-latest
            build_command: pnpm --filter @mps/desktop exec tauri build --config src-tauri/tauri.conf.json --no-bundle
            artifact_name: desktop-windows-x64-native
            artifact_path: apps/desktop/src-tauri/target/release/mps-desktop.exe
          - id: macos-arm64
            runs_on: macos-14
            build_command: pnpm --filter @mps/desktop exec tauri build --config src-tauri/tauri.conf.json --bundles app
            artifact_name: desktop-macos-arm64-native
            artifact_path: apps/desktop/src-tauri/target/release/bundle/macos/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: matrix.id == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget file pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Build native desktop artifact
        run: ${{ matrix.build_command }}

      - name: Upload native desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  github-pages-build:
    name: github-pages-build
    needs:
      - quality
      - web-e2e-smoke
    if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Resolve GitHub Pages base path
        id: pages-metadata
        uses: actions/github-script@v7
        with:
          script: |
            let cname = ""
            let basePath = `/${context.repo.repo}/`

            try {
              const response = await github.request("GET /repos/{owner}/{repo}/pages", {
                owner: context.repo.owner,
                repo: context.repo.repo
              })

              cname = response.data?.cname?.trim() ?? ""
              if (cname.length > 0) {
                basePath = "/"
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            core.setOutput("base_path", basePath)
            core.setOutput("cname", cname)

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Build web app for GitHub Pages
        env:
          MPS_WEB_BASE_PATH: ${{ steps.pages-metadata.outputs.base_path }}
        run: pnpm --filter @mps/web build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy-github-pages:
    name: deploy-github-pages
    needs:
      - github-pages-build
    if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  web-e2e-smoke:
    name: web-e2e-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm -w install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @mps/web exec playwright install --with-deps chromium

      - name: Run V1 e2e gates
        run: pnpm -w turbo run e2e:web e2e:desktop

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-web-artifacts
          path: .sisyphus/evidence/playwright/**
          if-no-files-found: warn
          retention-days: 14
