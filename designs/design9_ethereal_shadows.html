<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Shadows - Motion Graphics Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-obsidian: #010101;
            --poster-w: 240px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-obsidian);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Moving background textures */
        .noise-bg {
            position: fixed;
            top: -100px;
            left: -100px;
            width: calc(100% + 200px);
            height: calc(100% + 200px);
            z-index: 1;
            background:
                radial-gradient(circle at 20% 30%, rgba(30, 0, 80, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 40, 60, 0.1) 0%, transparent 50%);
            animation: bg-shift 40s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes bg-shift {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(-20px, 20px);
            }
        }

        .ethereal-container {
            position: relative;
            z-index: 50;
            /* Above noise-bg (10) and vignette (30) */
            display: flex;
            gap: 40px;
            padding: 0 40px;
            height: 100vh;
            width: 100%;
            justify-content: center;
            overflow: visible;
        }

        .column-v {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: var(--poster-w);
            animation: scroll-v var(--duration, 80s) infinite linear;
            filter: blur(var(--blur, 0px));
            opacity: var(--op, 1);
            flex-shrink: 0;
            height: fit-content;
        }

        @keyframes scroll-v {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-50%);
            }
        }

        .poster-ethereal {
            width: var(--poster-w);
            height: calc(var(--poster-w) * 1.5);
            border-radius: 8px;
            overflow: hidden;
            background: #222;
            /* More visible fallback */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            position: relative;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .poster-ethereal img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.7);
            transition: filter 1s ease, transform 1s ease;
        }

        .poster-ethereal.highlight {
            transform: scale(1.1) translateZ(50px);
            z-index: 100;
            border-color: rgba(255, 255, 255, 0.3);
            filter: brightness(1.2);
        }

        /* High-end Typography UI */
        .premium-clock {
            position: fixed;
            bottom: 60px;
            left: 60px;
            z-index: 300;
            /* Ensure on top of everything */
            pointer-events: none;
        }

        .time-stack {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .hour-large {
            font-size: 10rem;
            font-weight: 500;
            line-height: 0.8;
            letter-spacing: -6px;
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .min-stack {
            display: flex;
            flex-direction: column;
        }

        .min-val {
            font-size: 3rem;
            font-weight: 200;
            opacity: 0.6;
            letter-spacing: -1px;
        }

        .date-line {
            font-size: 1.2rem;
            font-weight: 300;
            background: linear-gradient(180deg, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* Vignette and Depth Overlay */
        .overlay-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            /* Below posters (50) */
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="noise-bg" style="background: white; opacity: 0.02;"></div>
    <div class="overlay-vignette"></div>

    <div class="ethereal-container" id="container">
        <!-- Columns by JS -->
    </div>

    <div class="premium-clock">
        <div class="time-stack">
            <div class="hour-large" id="h">00</div>
            <div class="min-stack">
                <div class="min-val" id="m">00</div>
            </div>
        </div>
        <div class="date-line" id="d">LOADING...</div>
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800"
        ];

        function init() {
            const container = document.getElementById('container');
            const colCount = Math.max(3, Math.floor(window.innerWidth / 300));
            console.log("Generating", colCount, "columns");

            for (let i = 0; i < colCount; i++) {
                const col = document.createElement('div');
                col.className = 'column-v';

                // Distant columns are blurred and more transparent
                const dist = Math.abs(i - Math.floor(colCount / 2));
                col.style.setProperty('--blur', `${dist * 2}px`);
                col.style.setProperty('--op', `${1 - (dist * 0.2)}`);
                col.style.setProperty('--duration', `${80 + Math.random() * 80}s`);

                const list = [...posters, ...posters, ...posters, ...posters].sort(() => Math.random() - 0.5);
                list.forEach(src => {
                    const poster = document.createElement('div');
                    poster.className = 'poster-ethereal';
                    poster.innerHTML = `<img src="${src}" alt="Poster" onerror="this.parentElement.style.background='#333'">`;
                    col.appendChild(poster);
                });

                container.appendChild(col);
            }

            setInterval(highlightRandom, 8000);
            setTimeout(highlightRandom, 1000);
        }

        function highlightRandom() {
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
            const all = document.querySelectorAll('.poster-ethereal');
            if (all.length > 0) {
                const target = all[Math.floor(Math.random() * all.length)];
                target.classList.add('highlight');
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('h').innerText = String(now.getHours()).padStart(2, '0');
            document.getElementById('m').innerText = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('d').innerText = now.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            }).toUpperCase();
        }

        window.onload = () => {
            console.log("Window loaded");
            init();
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>

</html>
