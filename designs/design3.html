<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术海报墙 - 渐隐轮播</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --poster-w: 200px;
            --poster-h: 300px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 动态背景 */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: blur(120px) brightness(0.15);
            transition: background-image 5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 氛围装饰遮罩 */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* 倾斜网格容器 */
        .grid-container {
            position: relative;
            display: grid;
            grid-template-columns: repeat(auto-fill, var(--poster-w));
            grid-auto-rows: calc(var(--poster-h) / 2);
            gap: 24px;
            padding: 10vh 5vw;
            width: 140vw;
            height: 140vh;
            transform: rotate(-4deg) translate(-15vw, -15vh);
            z-index: 2;
            pointer-events: none;
        }

        /* 单个海报格子 */
        .poster-cell {
            width: var(--poster-w);
            height: var(--poster-h);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            opacity: 0; /* 默认隐藏，由JS控制淡入 */
            transform: scale(0.9) translateY(20px);
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 3s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 3s ease;
            grid-row: span 2;
            background: #111;
        }

        /* 奇数列偏移 */
        .poster-cell:nth-child(odd) {
            transform: translateY(60px) scale(0.9);
        }

        .poster-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 10s linear;
        }

        /* 激活状态 */
        .poster-cell.visible {
            opacity: 0.6;
            transform: scale(1) translateY(0);
        }

        .poster-cell.visible:nth-child(odd) {
            transform: translateY(60px) scale(1);
        }

        /* 强亮状态（焦点） */
        .poster-cell.focus {
            opacity: 1;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            filter: brightness(1.1);
        }

        /* 时钟设计 */
        .floating-clock {
            position: fixed;
            bottom: 60px;
            left: 60px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .time-text {
            font-size: 8rem;
            font-weight: 100;
            line-height: 1;
            letter-spacing: -4px;
        }

        .date-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255,255,255,0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div class="vignette"></div>

    <div class="floating-clock">
        <div class="time-text" id="clock">00:00</div>
        <div class="date-text" id="date">2026.02.27</div>
    </div>

    <div class="grid-container" id="grid">
        <!-- 格子由 JS 填充 -->
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800",
            "https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=800",
            "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=800",
            "https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=800",
            "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=800",
            "https://images.unsplash.com/photo-1497124401559-3e75ec2ed774?q=80&w=800",
            "https://images.unsplash.com/photo-1512070670213-947264371a1c?q=80&w=800",
            "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=800",
            "https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?q=80&w=800"
        ];

        const grid = document.getElementById('grid');
        const bg = document.getElementById('dynamic-bg');
        const cells = [];

        // 初始化网格
        function initGrid() {
            // 根据屏幕尺寸动态计算格子数量
            const cols = Math.ceil(window.innerWidth / 220) + 4;
            const rows = Math.ceil(window.innerHeight / 150) + 4;
            const total = cols * 2; // 我们只需要填满视口宽度的格子，高度由 grid-row 控制

            for (let i = 0; i < 24; i++) {
                const cell = document.createElement('div');
                cell.className = 'poster-cell';
                cell.innerHTML = `<img>`;
                grid.appendChild(cell);
                cells.push(cell);
                
                // 给每个格子启动独立的轮播逻辑
                startCellCarousel(cell, i);
            }
        }

        // 单个格子的独立轮播逻辑
        async function startCellCarousel(cell, index) {
            const imgEl = cell.querySelector('img');
            
            // 初始随机等待时间，错开所有格子的节奏
            await new Promise(r => setTimeout(r, Math.random() * 5000));

            while (true) {
                // 1. 更换图片
                const randomPoster = posters[Math.floor(Math.random() * posters.length)];
                imgEl.src = randomPoster;

                // 2. 淡入
                cell.classList.add('visible');
                
                // 3. 停留一段时间 (8-15秒)
                const stayTime = 8000 + Math.random() * 7000;
                await new Promise(r => setTimeout(r, stayTime));

                // 4. 淡出
                cell.classList.remove('visible');
                cell.classList.remove('focus');

                // 5. 等待完全淡出后再进入下一轮循环 (4秒)
                await new Promise(r => setTimeout(r, 4000));
            }
        }

        // 全局背景控制：挑选当前最“亮”的海报作为大背景
        function updateGlobalFocus() {
            const visibleCells = cells.filter(c => c.classList.contains('visible'));
            if (visibleCells.length === 0) return;

            // 随机选一个处于显示状态的格子作为当前的“焦点”
            const focusTarget = visibleCells[Math.floor(Math.random() * visibleCells.length)];
            
            // 移除旧的焦点
            cells.forEach(c => c.classList.remove('focus'));
            
            // 设置新焦点
            focusTarget.classList.add('focus');
            const imgSrc = focusTarget.querySelector('img').src;
            if (imgSrc) {
                bg.style.backgroundImage = `url(${imgSrc})`;
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options).replace(/\//g, ' . ');
        }

        window.onload = () => {
            initGrid();
            updateClock();
            setInterval(updateClock, 1000);
            
            // 每 10 秒切换一次背景焦点
            setInterval(updateGlobalFocus, 10000);
            // 初始尽快执行一次
            setTimeout(updateGlobalFocus, 2000);
        };
    </script>
</body>
</html>
