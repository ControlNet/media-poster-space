<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Flow - Vibrant Media Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #030305;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Moving background light streaks */
        .prism-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
            background: linear-gradient(45deg, #000 20%, #1a0a2a 50%, #000 80%);
            background-size: 400% 400%;
            animation: gradient-move 30s infinite alternate ease-in-out;
        }

        @keyframes gradient-move {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 100% 100%;
            }
        }

        .prism-container {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 40px;
            align-items: center;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: drift-v var(--duration, 40s) infinite linear;
        }

        @keyframes drift-v {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-50%);
            }
        }

        .column:nth-child(even) {
            animation-direction: reverse;
        }

        .poster-prism {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 2/3;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .poster-prism img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.2) brightness(0.8);
        }

        .poster-prism:hover {
            transform: scale(1.05) rotate(1deg);
            z-index: 50;
        }

        /* Overlay text that moves very slowly */
        .bg-text {
            position: fixed;
            font-size: 20vw;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            letter-spacing: -1vw;
            animation: pan 120s infinite linear;
        }

        @keyframes pan {
            0% {
                transform: translate(-30%, -50%);
            }

            100% {
                transform: translate(-70%, -50%);
            }
        }

        .top-ui {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .top-ui h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 8px;
            opacity: 0.5;
        }

        .bottom-ui {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            text-align: right;
        }

        #clock {
            font-size: 6rem;
            font-weight: 100;
            line-height: 1;
            margin-bottom: 5px;
        }

        #date {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="prism-bg"></div>
    <div class="bg-text">COLLECTION</div>

    <div class="top-ui">
        <h1>JELLYFIN CINEMA</h1>
    </div>

    <div class="prism-container" id="container">
        <!-- Columns generated by JS -->
    </div>

    <div class="bottom-ui">
        <div id="clock">00:00</div>
        <div id="date">MONDAY, FEB 27</div>
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800"
        ];

        function init() {
            const container = document.getElementById('container');
            const colCount = 6;

            for (let i = 0; i < colCount; i++) {
                const col = document.createElement('div');
                col.className = 'column';
                col.style.setProperty('--duration', `${30 + Math.random() * 40}s`);

                // Double the posters for infinite scroll illusion
                const colPosters = [...posters, ...posters, ...posters].sort(() => Math.random() - 0.5);

                colPosters.forEach(src => {
                    const item = document.createElement('div');
                    item.className = 'poster-prism';
                    item.innerHTML = `<img src="${src}" alt="Poster">`;
                    col.appendChild(item);
                });

                container.appendChild(col);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        window.onload = () => {
            init();
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>

</html>
