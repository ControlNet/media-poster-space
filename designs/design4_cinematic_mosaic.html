<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Mosaic - Premium Media Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-deep: #020202;
            --accent-glow: rgba(60, 100, 255, 0.15);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Ambient background movement to prevent OLED burn-in */
        #ambient-canvas {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: 0;
            filter: blur(80px) brightness(0.4);
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 70%);
            animation: drift 60s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-2%, -2%) scale(1.05);
            }
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Grid */
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 8vh;
            gap: 16px;
            width: 95vw;
            height: 90vh;
            padding: 20px;
            transition: transform 10s ease-in-out;
        }

        .poster-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: opacity 2s ease, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: grayscale(20%) contrast(1.1);
        }

        .poster-item.active {
            opacity: 0.75;
            transform: translateY(0) scale(1);
        }

        .poster-item.highlight {
            opacity: 1;
            z-index: 20;
            filter: grayscale(0%) contrast(1.2);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .poster-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 20s linear;
        }

        .poster-item.active img {
            transform: scale(1.1);
        }

        /* Dynamic Glassmorphism UI */
        .glass-ui {
            position: fixed;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: ui-float 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes ui-float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(15px, 10px);
            }
        }

        .clock-container {
            bottom: 6vh;
            left: 5vw;
        }

        .time-display {
            font-size: 5rem;
            font-weight: 100;
            line-height: 1;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-display {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Poster Sizes */
        .size-1 {
            grid-column: span 2;
            grid-row: span 3;
        }

        .size-2 {
            grid-column: span 3;
            grid-row: span 4;
        }

        .size-3 {
            grid-column: span 2;
            grid-row: span 4;
        }

        .size-4 {
            grid-column: span 4;
            grid-row: span 5;
        }
    </style>
</head>

<body>

    <div id="ambient-canvas"></div>

    <div class="main-container">
        <div class="mosaic-grid" id="grid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <div class="glass-ui clock-container">
        <div class="time-display" id="time">00:00</div>
        <div class="date-display" id="date">FEB 27, 2026</div>
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800",
            "https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=800",
            "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=800",
            "https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=800",
            "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=800",
            "https://images.unsplash.com/photo-1497124401559-3e75ec2ed774?q=80&w=800",
            "https://images.unsplash.com/photo-1512070670213-947264371a1c?q=80&w=800",
            "https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?q=80&w=800"
        ];

        const grid = document.getElementById('grid');
        const items = [];

        function init() {
            // Create a pseudo-random mosaic
            for (let i = 0; i < 15; i++) {
                const item = document.createElement('div');
                const sizeClass = `size-${Math.floor(Math.random() * 4) + 1}`;
                item.className = `poster-item ${sizeClass}`;
                item.innerHTML = `<img src="${posters[i % posters.length]}" alt="Poster">`;
                grid.appendChild(item);
                items.push(item);

                // Staggered enter animation
                setTimeout(() => item.classList.add('active'), i * 200 + 500);

                startIndividualCycle(item);
            }
        }

        async function startIndividualCycle(item) {
            while (true) {
                const stayTime = 15000 + Math.random() * 20000;
                await new Promise(r => setTimeout(r, stayTime));

                item.classList.remove('active');
                await new Promise(r => setTimeout(r, 2000));

                // Change image
                const newImg = posters[Math.floor(Math.random() * posters.length)];
                item.querySelector('img').src = newImg;

                item.classList.add('active');
            }
        }

        function highlightRandom() {
            items.forEach(i => i.classList.remove('highlight'));
            const target = items[Math.floor(Math.random() * items.length)];
            target.classList.add('highlight');

            // Update ambient background based on highlight
            const imgSrc = target.querySelector('img').src;
            document.getElementById('ambient-canvas').style.backgroundImage = `url(${imgSrc})`;
            document.getElementById('ambient-canvas').style.backgroundSize = 'cover';
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        window.onload = () => {
            init();
            updateTime();
            setInterval(updateTime, 1000);
            setInterval(highlightRandom, 12000);
            setTimeout(highlightRandom, 2000);
        };
    </script>
</body>

</html>
