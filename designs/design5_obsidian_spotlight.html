<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Spotlight - OLED Optimized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-black: #000000;
            --poster-w: 220px;
            --poster-h: 330px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .wall-wrapper {
            position: absolute;
            top: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            transform: rotate(-12deg);
            animation: scroll-vertical 120s infinite linear;
        }

        @keyframes scroll-vertical {
            0% {
                transform: rotate(-12deg) translateY(0);
            }

            100% {
                transform: rotate(-12deg) translateY(20%);
            }
        }

        .poster-card {
            width: var(--poster-w);
            height: var(--poster-h);
            border-radius: 4px;
            background: #080808;
            position: relative;
            filter: grayscale(100%) brightness(0.2);
            transition: filter 1s ease, transform 1s ease;
        }

        /* The Spotlight Mask */
        #spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            background: radial-gradient(circle 400px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    transparent 0%,
                    rgba(0, 0, 0, 0.8) 70%,
                    rgba(0, 0, 0, 1) 100%);
        }

        /* Info Overlay */
        .info-panel {
            position: fixed;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            z-index: 100;
            max-width: 400px;
            pointer-events: none;
        }

        .title-glow {
            font-size: 4rem;
            font-weight: 700;
            line-height: 0.9;
            margin-bottom: 20px;
            opacity: 0.1;
            transition: opacity 2s ease;
        }

        .title-glow.active {
            opacity: 0.9;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .metadata {
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #444;
            text-transform: uppercase;
        }

        .poster-card.in-light {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        .clock-minimal {
            position: fixed;
            bottom: 40px;
            right: 40px;
            text-align: right;
            z-index: 100;
        }

        .clock-minimal .time {
            font-size: 3rem;
            font-weight: 100;
            color: #666;
        }
    </style>
</head>

<body>

    <div id="spotlight"></div>

    <div class="wall-wrapper" id="wall">
        <!-- Generated by JS -->
    </div>

    <div class="info-panel">
        <div class="metadata" id="meta-cat">NOW PLAYING</div>
        <div class="title-glow" id="active-title">OBSIDIAN</div>
        <div class="metadata" id="meta-year">2026 • DIRECTED BY DESIGN</div>
    </div>

    <div class="clock-minimal">
        <div class="time" id="clock">00:00</div>
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800"
        ];

        const wall = document.getElementById('wall');
        const spotlight = document.getElementById('spotlight');
        const cards = [];

        function init() {
            for (let i = 0; i < 60; i++) {
                const card = document.createElement('div');
                card.className = 'poster-card';
                card.style.backgroundImage = `url(${posters[i % posters.length]})`;
                card.style.backgroundSize = 'cover';
                wall.appendChild(card);
                cards.push(card);
            }
        }

        // Automatic spotlight movement for screensaver mode
        let angle = 0;
        function animateSpotlight() {
            angle += 0.005;
            const x = 50 + Math.cos(angle) * 30;
            const y = 50 + Math.sin(angle * 0.7) * 30;

            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);

            // Find which cards are "in the light"
            const spotlightRect = { x: (x / 100) * window.innerWidth, y: (y / 100) * window.innerHeight };

            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                const dist = Math.hypot(spotlightRect.x - cardCenter.x, spotlightRect.y - cardCenter.y);

                if (dist < 300) {
                    card.classList.add('in-light');
                } else {
                    card.classList.remove('in-light');
                }
            });

            requestAnimationFrame(animateSpotlight);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
        }

        window.onload = () => {
            init();
            animateSpotlight();
            updateClock();
            setInterval(updateClock, 1000);

            // Randomly change text for effect
            const titles = ["CINEMATIC", "ETHEREAL", "NOCTURNAL", "OBSIDIAN", "GALLERY"];
            setInterval(() => {
                const titleEl = document.getElementById('active-title');
                titleEl.classList.remove('active');
                setTimeout(() => {
                    titleEl.innerText = titles[Math.floor(Math.random() * titles.length)];
                    titleEl.classList.add('active');
                }, 1000);
            }, 8000);
            setTimeout(() => document.getElementById('active-title').classList.add('active'), 500);
        };
    </script>
</body>

</html>
