<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Design Baseline - Media Poster Space</title>
    <style>
        :root {
            color-scheme: dark;
            --mps-color-canvas: #080c14;
            --mps-color-surface: #101728;
            --mps-color-surface-raised: #182238;
            --mps-color-border: #33425e;
            --mps-color-foreground: #f4efe4;
            --mps-color-foreground-muted: #b9b3a6;
            --mps-color-foreground-emphasis: #fcf8f0;
            --mps-color-foreground-support: #d8deea;
            --mps-color-orbit-glow: rgba(122, 217, 255, 0.42);
            --mps-color-orbit-glow-halo: rgba(122, 217, 255, 0.2);
            --mps-color-telemetry: #7ad9ff;
            --mps-color-telemetry-muted: #456f87;
            --mps-color-telemetry-soft: #24394b;
            --mps-overlay-depth-near: rgba(12, 24, 44, 0.72);
            --mps-overlay-depth-far: rgba(3, 8, 18, 0.9);
            --mps-color-accent: #d2a65a;
            --mps-color-accent-muted: #523f26;
            --mps-color-accent-soft: #776240;
            --mps-color-accent-foreground: #121620;
            --mps-color-accent-ring: #dcbc7c;
            --mps-elevation-orbit: 0 0 0 1px rgba(122, 217, 255, 0.28), 0 0 40px rgba(122, 217, 255, 0.26), 0 0 74px rgba(8, 19, 35, 0.88);
            --mps-elevation-dramatic: 0 24px 68px -18px rgba(0, 0, 0, 0.92);
            --mps-radius-lg: 0.875rem;

            --mps-font-display: "Avenir Next Condensed", "Segoe UI", system-ui, sans-serif;
            --mps-font-body: "Avenir Next", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
            --mps-font-mono: "IBM Plex Mono", "SFMono-Regular", ui-monospace, Menlo, monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--mps-color-canvas);
            color: var(--mps-color-foreground);
            font-family: var(--mps-font-body);
            overflow-x: hidden;
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1.5rem, 5vw, 3rem);
            background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--mps-color-canvas) 40%, #152033), var(--mps-color-canvas) 80%);
            box-sizing: border-box;
        }

        .card {
            width: min(40rem, 100%);
            display: grid;
            gap: 1.25rem;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--mps-radius-lg);
            background: linear-gradient(154deg, rgba(16, 23, 40, 0.45) 0%, rgba(8, 12, 20, 0.65) 100%);
            box-shadow: var(--mps-elevation-dramatic), inset 0 0 0 1px rgba(122, 217, 255, 0.05);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
        }

        h1 {
            margin: 0;
            font-family: var(--mps-font-display);
            font-size: clamp(1.75rem, 4vw, 2.3rem);
            letter-spacing: -0.02em;
        }

        .description {
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--mps-color-foreground-support);
            letter-spacing: 0.02em;
        }

        input[type="url"],
        input[type="text"],
        input[type="password"] {
            padding: 0.75rem 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.6rem;
            background: rgba(0, 0, 0, 0.3);
            color: var(--mps-color-foreground);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--mps-color-orbit-glow-halo);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(122, 217, 255, 0.1);
            background: rgba(0, 0, 0, 0.5);
        }

        .checkbox-label {
            display: inline-flex;
            gap: 0.45rem;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        button {
            padding: 0.75rem 1rem;
            border-radius: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: transform 0.1s ease, box-shadow 0.2s ease, filter 0.2s ease;
            cursor: pointer;
            border: 1px solid color-mix(in srgb, var(--mps-color-accent-ring) 50%, transparent);
            background: linear-gradient(135deg, color-mix(in srgb, var(--mps-color-accent-muted) 80%, black) 0%, color-mix(in srgb, var(--mps-color-accent-soft) 70%, black) 100%);
            color: var(--mps-color-foreground-emphasis);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        form {
            display: grid;
            gap: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .remember-row {
            display: grid;
            gap: 0.5rem;
        }

        .login-submit {
            margin-top: 0.5rem;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .app-shell {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell" data-testid="app-shell">
        <section class="card">
            <h1 data-testid="onboarding-title">Connect Jellyfin</h1>
            <p class="description">Three-step onboarding: server preflight, username/password authentication, then library selection.</p>
            
            <div class="form-group">
                <label for="server-url">Jellyfin server URL</label>
                <input id="server-url" data-testid="server-url-input" type="url" name="serverUrl" placeholder="https://jellyfin.example" value="">
            </div>

            <label class="checkbox-label">
                <input data-testid="remember-server-checkbox" type="checkbox">
                <span>Remember last server</span>
            </label>

            <button data-testid="preflight-check-button" type="button">Preflight server</button>

            <form>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" data-testid="username-input" type="text" name="username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" data-testid="password-input" type="password" name="password" autocomplete="current-password">
                </div>
                
                <div class="remember-row">
                    <label class="checkbox-label">
                        <input data-testid="remember-username-checkbox" type="checkbox">
                        <span>Remember username</span>
                    </label>
                </div>

                <button class="login-submit" data-testid="login-submit" type="submit">Sign in</button>
            </form>
        </section>
    </main>
</body>
</html>
