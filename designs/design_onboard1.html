<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Provider Onboarding Design - Media Poster Space</title>
    <style>
        :root {
            color-scheme: dark;
            --mps-color-canvas: #080c14;
            --mps-color-surface: #101728;
            --mps-color-surface-raised: #182238;
            --mps-color-border: #33425e;
            --mps-color-foreground: #f4efe4;
            --mps-color-foreground-muted: #b9b3a6;
            --mps-color-foreground-emphasis: #fcf8f0;
            --mps-color-foreground-support: #d8deea;
            
            /* Dynamic Accent - Defaulting to Jellyfin Purple */
            --provider-accent: #aa5cc3;
            --provider-glow: rgba(170, 92, 195, 0.4);
            
            --mps-color-orbit-glow: var(--provider-glow);
            --mps-color-orbit-glow-halo: rgba(170, 92, 195, 0.15);
            
            --mps-elevation-orbit: 0 0 0 1px var(--mps-color-orbit-glow-halo), 0 0 40px var(--mps-color-orbit-glow), 0 0 74px rgba(8, 19, 35, 0.88);
            --mps-elevation-dramatic: 0 24px 68px -18px rgba(0, 0, 0, 0.92);
            --mps-radius-lg: 0.875rem;

            --mps-font-display: "Avenir Next Condensed", "Segoe UI", system-ui, sans-serif;
            --mps-font-body: "Avenir Next", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
        }

        /* Provider Specific Theming */
        .provider-jellyfin { --provider-accent: #aa5cc3; --provider-glow: rgba(170, 92, 195, 0.4); }
        .provider-emby { --provider-accent: #52b54b; --provider-glow: rgba(82, 181, 75, 0.35); }
        .provider-plex { --provider-accent: #e5a00d; --provider-glow: rgba(229, 160, 13, 0.35); }

        body {
            margin: 0;
            padding: 0;
            background: var(--mps-color-canvas);
            color: var(--mps-color-foreground);
            font-family: var(--mps-font-body);
            overflow-x: hidden;
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1.5rem, 5vw, 3rem);
            background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--mps-color-canvas) 40%, #171c2b), var(--mps-color-canvas) 85%);
            box-sizing: border-box;
        }

        .card {
            width: min(42rem, 100%);
            display: grid;
            gap: 1.5rem;
            padding: clamp(2rem, 5vw, 3rem);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--mps-radius-lg);
            background: linear-gradient(154deg, rgba(20, 28, 48, 0.45) 0%, rgba(10, 15, 25, 0.65) 100%);
            box-shadow: var(--mps-elevation-dramatic), inset 0 0 0 1px rgba(122, 217, 255, 0.03);
            backdrop-filter: blur(32px) saturate(1.3);
            -webkit-backdrop-filter: blur(32px) saturate(1.3);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card-header {
            display: grid;
            gap: 0.5rem;
        }

        h1 {
            margin: 0;
            font-family: var(--mps-font-display);
            font-size: clamp(2rem, 5vw, 2.6rem);
            letter-spacing: -0.03em;
            background: linear-gradient(to bottom, #fff, #b9b3a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            margin: 0;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            font-size: 1rem;
        }

        /* Provider Selector */
        .provider-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .provider-option {
            position: relative;
            cursor: pointer;
            padding: 1.25rem 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .provider-option:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .provider-option.active {
            background: rgba(var(--provider-accent-rgb, 255, 255, 255), 0.08);
            border-color: var(--provider-accent);
            box-shadow: 0 0 20px var(--provider-glow);
        }

        .provider-option.active[data-provider="jellyfin"] { border-color: #aa5cc3; box-shadow: 0 0 25px rgba(170, 92, 195, 0.2); }
        .provider-option.active[data-provider="emby"] { border-color: #52b54b; box-shadow: 0 0 25px rgba(82, 181, 75, 0.2); }
        .provider-option.active[data-provider="plex"] { border-color: #e5a00d; box-shadow: 0 0 25px rgba(229, 160, 13, 0.2); }

        .provider-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: grayscale(0.2) brightness(0.9);
            transition: all 0.3s ease;
        }

        .provider-option.active .provider-icon {
            filter: none;
            transform: scale(1.1);
        }

        .provider-name {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        .provider-option.active .provider-name {
            color: #fff;
        }

        /* Form Styling */
        .form-section {
            display: grid;
            gap: 1.25rem;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            display: grid;
            gap: 0.6rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--mps-color-foreground-support);
            letter-spacing: 0.03em;
        }

        input[type="url"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--provider-accent);
            box-shadow: 0 0 0 3px var(--provider-glow);
        }

        .main-action {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, var(--provider-accent) 0%, color-mix(in srgb, var(--provider-accent) 60%, black) 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .main-action:active {
            transform: translateY(1px);
        }

        .secondary-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .checkbox-group input {
            accent-color: var(--provider-accent);
        }

        /* SVG Logos Mockup */
        .svg-jellyfin { fill: #aa5cc3; }
        .svg-emby { fill: #52b54b; }
        .svg-plex { fill: #e5a00d; }

        /* Status Bar Simulation */
        .status-message {
            margin-top: 0.5rem;
            padding: 0.6rem 0.85rem;
            border-radius: 0.6rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-message.pending .status-dot {
            background: var(--provider-accent);
            box-shadow: 0 0 10px var(--provider-accent);
            animation: pulse 1.5s infinite;
        }

        .status-message.success {
            background: rgba(82, 181, 75, 0.1);
            border-color: rgba(82, 181, 75, 0.2);
            color: #8ce685;
        }

        .status-message.success .status-dot {
            background: #52b54b;
            box-shadow: 0 0 10px #52b54b;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body class="provider-jellyfin">
    <main class="app-shell">
        <section class="card" id="onboarding-card">
            <header class="card-header">
                <h1>Connect Media Server</h1>
            </header>
            
            <div class="provider-selector">
                <div class="provider-option active" data-provider="jellyfin" onclick="selectProvider('jellyfin')">
                    <div class="provider-icon">
                        <svg viewBox="0 0 24 24" class="svg-jellyfin" width="32" height="32" xmlns="http://www.w3.org/2000/svg"><path d="M12 .002C8.826.002-1.398 18.537.16 21.666c1.56 3.129 22.14 3.094 23.682 0C25.384 18.573 15.177 0 12 0zm7.76 18.949c-1.008 2.028-14.493 2.05-15.514 0C3.224 16.9 9.92 4.755 12.003 4.755c2.081 0 8.77 12.166 7.759 14.196zM12 9.198c-1.054 0-4.446 6.15-3.93 7.189.518 1.04 7.348 1.027 7.86 0 .511-1.027-2.874-7.19-3.93-7.19z"/></svg>
                    </div>
                    <span class="provider-name">Jellyfin</span>
                </div>
                <div class="provider-option" data-provider="emby" onclick="selectProvider('emby')">
                    <div class="provider-icon">
                        <svg viewBox="0 0 24 24" class="svg-emby" width="32" height="32" xmlns="http://www.w3.org/2000/svg"><path d="M11.041 0c-.007 0-1.456 1.43-3.219 3.176L4.615 6.352l.512.513.512.512-2.819 2.791L0 12.961l1.83 1.848c1.006 1.016 2.438 2.46 3.182 3.209l1.351 1.359.508-.496c.28-.273.515-.498.524-.498.008 0 1.266 1.264 2.794 2.808L12.97 24l.187-.182c.23-.225 5.007-4.95 5.717-5.656l.52-.516-.502-.513c-.276-.282-.5-.52-.496-.53.003-.009 1.264-1.26 2.802-2.783 1.538-1.522 2.8-2.776 2.803-2.785.005-.012-3.617-3.684-6.107-6.193L17.65 4.6l-.505.505c-.279.278-.517.501-.53.497-.013-.005-1.27-1.267-2.793-2.805A449.655 449.655 0 0011.041 0zM9.223 7.367c.091.038 7.951 4.608 7.957 4.627.003.013-1.781 1.056-3.965 2.32a999.898 999.898 0 01-3.996 2.307c-.019.006-.026-1.266-.026-4.629 0-3.7.007-4.634.03-4.625Z"/></svg>
                    </div>
                    <span class="provider-name">Emby</span>
                </div>
                <div class="provider-option" data-provider="plex" onclick="selectProvider('plex')">
                    <div class="provider-icon">
                        <svg viewBox="0 0 24 24" class="svg-plex" width="32" height="32" xmlns="http://www.w3.org/2000/svg"><path d="M3.987 8.409c-.96 0-1.587.28-2.12.933v-.72H0v8.88s.038.018.127.037c.138.03.821.187 1.331-.249.441-.377.542-.814.542-1.318v-1.283c.533.573 1.147.813 2 .813 1.84 0 3.253-1.493 3.253-3.48 0-2.12-1.36-3.613-3.266-3.613Zm16.748 5.595.406.591c.391.614.894.906 1.492.908.621-.012 1.064-.562 1.226-.755 0 0-.307-.27-.686-.72-.517-.614-1.214-1.755-1.24-1.803l-1.198 1.779Zm-3.205-1.955c0-2.08-1.52-3.64-3.52-3.64s-3.467 1.587-3.467 3.573a3.48 3.48 0 0 0 3.507 3.52c1.413 0 2.626-.84 3.253-2.293h-2.04l-.093.093c-.427.4-.72.533-1.227.533-.787 0-1.373-.506-1.453-1.266h4.986c.04-.214.054-.307.054-.52Zm-7.671-.219c0 .769.11 1.701.868 2.722l.056.069c-.306.526-.742.88-1.248.88-.399 0-.814-.211-1.138-.579a2.177 2.177 0 0 1-.538-1.441V6.409H9.86l-.001 5.421Zm9.283 3.46h-2.39l2.247-3.332-2.247-3.335h2.39l2.248 3.335-2.248 3.332Zm1.593-1.286Zm-17.162-.342c-.933 0-1.68-.773-1.68-1.72s.76-1.666 1.68-1.666c.92 0 1.68.733 1.68 1.68 0 .946-.733 1.706-1.68 1.706Zm18.361-1.974L24 8.622h-2.391l-.87 1.293 1.195 1.773Zm-9.404-.466c.16-.706.72-1.133 1.493-1.133.773 0 1.373.467 1.507 1.133h-3Z"/></svg>
                    </div>
                    <span class="provider-name">Plex</span>
                </div>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <div class="label-row">
                        <label for="server-url">SERVER ADDRESS</label>
                    </div>
                    <input id="server-url" type="url" placeholder="https://jellyfin.yourdomain.com" value="">
                    
                    <!-- Simulating Server Status -->
                    <div class="status-message pending" id="server-status">
                        <div class="status-dot"></div>
                        <span class="status-text">Checking server reachability...</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <input id="username" type="text" placeholder="Enter your credentials">
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input id="password" type="password" placeholder="••••••••">
                </div>

                <div class="secondary-group">
                    <label class="checkbox-group">
                        <input type="checkbox" checked>
                        <span>Remember Connection</span>
                    </label>
                </div>

                <button class="main-action" id="action-btn">AUTHENTICATE JELLYFIN</button>
            </div>
        </section>
    </main>

    <script>
        function selectProvider(provider) {
            // Update UI state
            document.body.className = 'provider-' + provider;
            
            // Update active state in selector
            document.querySelectorAll('.provider-option').forEach(opt => {
                opt.classList.remove('active');
            });
            document.querySelector(`[data-provider="${provider}"]`).classList.add('active');
            
            // Update content
            const btn = document.getElementById('action-btn');
            const urlInput = document.getElementById('server-url');
            
            const providerNames = {
                jellyfin: 'Jellyfin',
                emby: 'Emby',
                plex: 'Plex'
            };
            
            const placeholders = {
                jellyfin: 'https://jellyfin.yourdomain.com',
                emby: 'https://emby.yourdomain.com',
                plex: 'https://plex.tv'
            };

            btn.textContent = 'AUTHENTICATE ' + providerNames[provider].toUpperCase();
            urlInput.placeholder = placeholders[provider];

            // Trigger reflow animation
            const form = document.querySelector('.form-section');
            form.style.animation = 'none';
            form.offsetHeight; // trigger reflow
            form.style.animation = null;
        }

        // Simulate Status Change for Demo
        setTimeout(() => {
            const statusBox = document.getElementById('server-status');
            const statusText = statusBox.querySelector('.status-text');
            
            statusBox.className = 'status-message success';
            statusText.textContent = 'Server reachable. Version 10.9.1 detected.';
        }, 2500);
    </script>
</body>
</html>
