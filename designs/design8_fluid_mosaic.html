<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Mosaic - Organic Media Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-black: #000000;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Particles/Grain effect for depth */
        #grain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.05;
            pointer-events: none;
        }

        .fluid-wall {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 24px;
            padding: 100px 50px;
            height: 100vh;
            width: max-content;
            animation: swim 240s infinite linear;
        }

        @keyframes swim {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .column-group {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .column-group:nth-child(even) {
            padding-top: 100px;
            /* Stagger effect */
        }

        .poster-fluid {
            width: 220px;
            height: 330px;
            border-radius: 20px;
            overflow: hidden;
            background: #080808;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .poster-fluid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 1s ease, transform 1s ease;
        }

        .poster-fluid.spotlight img {
            opacity: 1;
            transform: scale(1.1);
        }

        .poster-fluid.spotlight {
            border-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            z-index: 20;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.05);
        }

        /* Minimalist Vertical Clock */
        .vertical-info {
            position: fixed;
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 100;
            mix-blend-mode: exclusion;
        }

        .hour {
            font-size: 8rem;
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -5px;
        }

        .minute {
            font-size: 8rem;
            font-weight: 100;
            line-height: 0.8;
            letter-spacing: -5px;
            opacity: 0.5;
        }

        .date-badge {
            margin-top: 20px;
            font-size: 1rem;
            letter-spacing: 5px;
            background: #fff;
            color: #000;
            padding: 5px 15px;
            text-transform: uppercase;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="grain-canvas"></div>
    <div class="vignette"></div>

    <div class="fluid-wall" id="wall">
        <!-- Generated by JS -->
    </div>

    <div class="vertical-info">
        <div class="hour" id="hour">16</div>
        <div class="minute" id="min">52</div>
        <div class="date-badge" id="date">FEB 27</div>
    </div>

    <script>
        const posters = [
            "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800",
            "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=800",
            "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=800",
            "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800",
            "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=800",
            "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=800",
            "https://images.unsplash.com/photo-1535016120720-40c646bebbdc?q=80&w=800"
        ];

        function init() {
            const wall = document.getElementById('wall');
            const groupCount = 30; // Large number for infinite-ish scroll

            for (let i = 0; i < groupCount; i++) {
                const group = document.createElement('div');
                group.className = 'column-group';

                // Add two random posters to each group
                for (let j = 0; j < 2; j++) {
                    const poster = document.createElement('div');
                    poster.className = 'poster-fluid';
                    const src = posters[Math.floor(Math.random() * posters.length)];
                    poster.innerHTML = `<img src="${src}" alt="Poster">`;
                    group.appendChild(poster);
                }
                wall.appendChild(group);
            }

            startSpotlightRotation();
        }

        function startSpotlightRotation() {
            const all = document.querySelectorAll('.poster-fluid');
            setInterval(() => {
                all.forEach(p => p.classList.remove('spotlight'));
                // Pick 3 random posters to spotlight
                for (let i = 0; i < 3; i++) {
                    const target = all[Math.floor(Math.random() * all.length)];
                    target.classList.add('spotlight');
                }
            }, 6000);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('hour').innerText = String(now.getHours()).padStart(2, '0');
            document.getElementById('min').innerText = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        window.onload = () => {
            init();
            updateTime();
            setInterval(updateTime, 1000);
        };
    </script>
</body>

</html>
